# 留白 — honkerc.cn 生产 Nginx 配置
#
# 目录约定：
#   /www/liubai/dist      前端构建产物
#   /www/liubai/backend   FastAPI 源码
#   /www/liubai/.venv     Python 虚拟环境
#   /www/liubai/uploads/       上传文件（DATA_DIR=/www/liubai）
#   /www/liubai/db.sqlite3     数据库（DATA_DIR=/www/liubai）
#
# 安装：
#   sudo cp deploy/honkerc.cn.conf /etc/nginx/sites-available/honkerc.cn
#   sudo ln -sf /etc/nginx/sites-available/honkerc.cn /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream liubai_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

# ========== honkerc.cn 博客主站（响应式，含移动端） ==========
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name honkerc.cn;

    ssl_certificate /etc/letsencrypt/live/honkerc.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/honkerc.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;

    root /www/liubai/dist;
    index index.html;

    location /uploads/ {
        alias /www/liubai/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /api/ {
        proxy_pass http://liubai_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# mini 子域：响应式单前端，重定向到主站
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mini.honkerc.cn;

    ssl_certificate /etc/letsencrypt/live/honkerc.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/honkerc.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://honkerc.cn$request_uri;
}

# ========== demo 静态站 ==========
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name demo.honkerc.cn;

    ssl_certificate /etc/letsencrypt/live/honkerc.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/honkerc.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/demoList;
    index index.html index.htm;

    location / {
        autoindex on;
        try_files $uri $uri/ =404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }
}

# ========== HTTP → HTTPS（Certbot） ==========
server {
    listen 80;
    listen [::]:80;
    server_name honkerc.cn;

    if ($host = honkerc.cn) {
        return 301 https://$host$request_uri;
    }

    return 404;
}

server {
    listen 80;
    listen [::]:80;
    server_name mini.honkerc.cn;

    if ($host = mini.honkerc.cn) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
