# 留白 — Nginx 站点配置
# 安装：sudo cp deploy/nginx.conf /etc/nginx/sites-available/blog
#       sudo ln -sf /etc/nginx/sites-available/blog /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# 默认部署目录 /www/liubai：
#   /www/liubai/dist      前端构建产物
#   /www/liubai/uploads/       上传文件（DATA_DIR=/www/liubai）
#   /www/liubai/db.sqlite3     数据库

upstream liubai_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # return 301 https://$host$request_uri;

    client_max_body_size 100m;

    root /www/liubai/dist;
    index index.html;

    location /uploads/ {
        alias /www/liubai/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /api/ {
        proxy_pass http://liubai_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

