services:
  blog:
    build: .
    image: liubai:latest
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      STATIC_DIR: /app/static
      SERVE_STATIC: "true"
      HOST: 0.0.0.0
      PORT: 8000
    volumes:
      - blog-data:/data
    restart: unless-stopped

volumes:
  blog-data:
